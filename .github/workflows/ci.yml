name: CI

on:
  push:
  pull_request:

jobs:
  frontend-and-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm secret:scan
      - run: pnpm fixture:scan
      - run: pnpm build
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

  windows-build-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: pnpm install --frozen-lockfile
      - name: Run Rust tests, including native Codex protocol and discovery
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: pnpm test
      - run: pnpm exec tauri build --target x86_64-pc-windows-msvc
      - name: Run installed packaged connector smoke
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/TokenStack_*_x64-setup.exe" | Select-Object -First 1
          pwsh ./scripts/windows-smoke.ps1 -InstallerPath $installer.FullName
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tokenstack-windows-packaged-smoke-diagnostics
          path: artifacts/windows-packaged-smoke/* diagnostics/tokenstack-diagnostics-*.json
          if-no-files-found: warn
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tokenstack-windows-x64-setup
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/TokenStack_*_x64-setup.exe
          if-no-files-found: warn
          retention-days: 30
